name: Curamind

services:
  db:
    image: ankane/pgvector:latest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - backend-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 3
  
  pgadmin:
    image: dpage/pgadmin4:9.12
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: manj2825@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    networks:
      - backend-net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - frontend-net
      - backend-net
    volumes:
      - ./backend:/app:z
    env_file:
      - .env
    working_dir: /app/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 3
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('127.0.0.1', 8000))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    command: python main.py

volumes:
  postgres_data:
  pgadmin_data:

networks:
  frontend-net:
  backend-net:
